# Postgres/PostGIS for Israel GTFS Detour Router (primary data layer).
# Optional: run the API with DATABASE_URL pointing at this service.
version: "3.8"

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: israel-gtfs-postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-israel_gtfs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./backend:/backend:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-israel_gtfs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: israel-gtfs-backend
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      # Match backend/db_access.py expectation
      DATABASE_URL: "postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgis:5432/${POSTGRES_DB:-israel_gtfs}"
      OSM_ENGINE_URL: "http://osrm:5000"
      VALHALLA_URL: "http://valhalla:8002"
    ports:
      - "8000:8000"

  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm-israel
    command: >
      osrm-routed
      --algorithm mld
      /data/israel.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osm:/data
    restart: unless-stopped

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: valhalla-israel
    environment:
      use_tiles_ignore_pbf: "False"
    ports:
      - "8002:8002"
    volumes:
      - ./osm:/custom_files
    restart: unless-stopped

volumes:
  postgis_data:

# Usage:
# 1) Place data:
#    - GTFS zip at ./israel-public-transportation.zip
#    - OSM extract at ./osm/israel.osm.pbf
#    - OSRM preprocessed files at ./osm/israel.osrm* (see README for extract/partition/customize)
# 2) Start stack:
#    docker compose up --build
# 3) Create PostGIS schema (once):
#    docker compose exec postgis psql -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-israel_gtfs} -f /backend/db_postgis_schema.sql
# 4) Ingest GTFS & build patterns (from host or a one-off container) pointing at postgis:5432.

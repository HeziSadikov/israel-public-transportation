services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: israel-gtfs-postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-israel_gtfs}
      TZ: ${LOCAL_TZ:-Asia/Jerusalem}
      PGTZ: ${LOCAL_TZ:-Asia/Jerusalem}
    command:
      - postgres
      - -c
      - timezone=${LOCAL_TZ:-Asia/Jerusalem}
      - -c
      - log_timezone=${LOCAL_TZ:-Asia/Jerusalem}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./backend:/backend:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-israel_gtfs}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: israel-gtfs-backend
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgis:5432/${POSTGRES_DB:-israel_gtfs}"
      OSM_ENGINE_URL: "http://osrm:5000"
      VALHALLA_URL: "http://valhalla:8002"
      TZ: ${LOCAL_TZ:-Asia/Jerusalem}
      GRAPH_WARMUP_ENABLED: ${GRAPH_WARMUP_ENABLED:-true}
      GRAPH_WARMUP_TIMEOUT_S: ${GRAPH_WARMUP_TIMEOUT_S:-300}
      GRAPH_WARMUP_PROFILES: ${GRAPH_WARMUP_PROFILES:-weekday,friday,saturday,sunday}
      HYBRID_DETOUR_ENABLED: ${HYBRID_DETOUR_ENABLED:-true}
      # Preview warmup loads tens of thousands of pickled graphs into RAM; Docker Desktop
      # often OOM-kills (exit 137) before startup finishes. Override with true if you raise memory.
      GRAPH_WARMUP_PREVIEWS_ENABLED: ${GRAPH_WARMUP_PREVIEWS_ENABLED:-false}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_cache:/root/.cache
    command: python -m run_uvicorn

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: israel-gtfs-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://127.0.0.1:8000/api/v1}
      TZ: ${LOCAL_TZ:-Asia/Jerusalem}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0

  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm-israel
    profiles: ["routing"]
    environment:
      TZ: ${LOCAL_TZ:-Asia/Jerusalem}
    command: >
      osrm-routed
      --algorithm mld
      /data/israel.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osm:/data
    restart: unless-stopped

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: valhalla-israel
    profiles: ["routing"]
    environment:
      tile_urls: "https://download.geofabrik.de/asia/israel-and-palestine-latest.osm.pbf"
      use_tiles_ignore_pbf: "False"
      TZ: ${LOCAL_TZ:-Asia/Jerusalem}
    ports:
      - "8002:8002"
    volumes:
      - ./osm:/custom_files
    restart: unless-stopped

volumes:
  postgis_data:
  backend_cache:
  frontend_node_modules:
